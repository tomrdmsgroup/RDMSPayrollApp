  function renderComparisonStatusAndMetrics(comparison, fallbackCsvRowCount, fallbackApiRowCount) {
    const status = getToastComparisonStatus(comparison, fallbackCsvRowCount);
    const s = comparison && comparison.summary ? comparison.summary : null;
    const apiRows = s ? s.api_row_count || 0 : fallbackApiRowCount || 0;
    const csvRows = s && Number.isFinite(s.csv_row_count)
      ? s.csv_row_count
      : Array.isArray(comparison?.uploaded_csv_rows)
      ? comparison.uploaded_csv_rows.length
      : fallbackCsvRowCount || 0;
    const missingInCsv = s ? s.missing_in_csv_count || 0 : 0;
    const missingInApi = s ? s.missing_in_api_count || 0 : 0;
    const mismatchCount = s ? s.mismatch_count || 0 : 0;
    const matchedRows = Math.max(0, apiRows - missingInCsv - mismatchCount);
    return `
      <div class="statusCard ${status.klass}">
        <div class="statusCardTitle">Comparison status</div>
        <div class="statusCardValue">${escapeHtml(status.label)}</div>
        <div class="muted" style="margin-top:4px;">${escapeHtml(status.reason)}</div>
      </div>
      <div class="summaryGrid" style="margin-top:10px;">
        <div class="summaryMetric"><div class="summaryMetricLabel">API rows</div><div class="summaryMetricValue">${escapeHtml(String(apiRows))}</div></div>
        <div class="summaryMetric"><div class="summaryMetricLabel">CSV rows</div><div class="summaryMetricValue">${escapeHtml(String(csvRows))}</div></div>
        <div class="summaryMetric"><div class="summaryMetricLabel">Matched rows</div><div class="summaryMetricValue">${escapeHtml(String(matchedRows))}</div></div>
        <div class="summaryMetric"><div class="summaryMetricLabel">Missing in API</div><div class="summaryMetricValue">${escapeHtml(String(missingInApi))}</div></div>
        <div class="summaryMetric"><div class="summaryMetricLabel">Missing in CSV</div><div class="summaryMetricValue">${escapeHtml(String(missingInCsv))}</div></div>
        <div class="summaryMetric"><div class="summaryMetricLabel">Mismatch count</div><div class="summaryMetricValue">${escapeHtml(String(mismatchCount))}</div></div>
      </div>
    `;
  }

  function renderSimpleRowsTable(title, rows, columns, emptyLabel) {
    const displayRows = Array.isArray(rows) ? rows.slice(0, 100) : [];
    const head = columns.map((c) => `<th>${escapeHtml(c)}</th>`).join("");
    const body = displayRows.length
      ? displayRows
          .map((row) => {
            const cells = columns.map((col) => `<td>${escapeHtml(String(row && row[col] !== undefined && row[col] !== null ? row[col] : ""))}</td>`).join("");
            return `<tr>${cells}</tr>`;
          })
          .join("")
      : `<tr><td colspan="${Math.max(columns.length,1)}" class="muted">${escapeHtml(emptyLabel)}</td></tr>`;

    return `
      <div class="sectionTitle">${escapeHtml(title)}</div>
      <div class="tableScroll"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
      ${Array.isArray(rows) && rows.length > 100 ? `<div class='muted' style='margin-top:6px;'>Showing first 100 rows of ${escapeHtml(String(rows.length))}.</div>` : ""}
    `;
  }

  function renderColumnMismatchesTable(mismatches) {
    const rows = Array.isArray(mismatches) ? mismatches.slice(0, 100) : [];
    const body = rows.length
      ? rows
          .map((row) => {
            const diffs = Array.isArray(row?.diffs)
              ? row.diffs
                  .map(
                    (d) =>
                      `<div><b>${escapeHtml(String(d.field || ""))}</b>: API="${escapeHtml(String(d.api_value ?? ""))}" vs CSV="${escapeHtml(
                        String(d.csv_value ?? "")
                      )}"</div>`
                  )
                  .join("")
              : "";
            return `<tr>
              <td>${escapeHtml(String(row?.api_row?.employee_id || ""))}</td>
              <td>${escapeHtml(String(row?.api_row?.employee_name || ""))}</td>
              <td>${escapeHtml(String(row?.api_row?.job_title || row?.api_row?.department || ""))}</td>
              <td>${diffs || "<span class='muted'>No diff details.</span>"}</td>
            </tr>`;
          })
          .join("")
      : `<tr><td colspan="4" class="muted">No column mismatches.</td></tr>`;
    return `
      <div class="sectionTitle">Column mismatches</div>
      <div class="tableScroll">
        <table>
          <thead>
            <tr>
              <th>employee_id</th>
              <th>employee_name</th>
              <th>department</th>
              <th>differences</th>
            </tr>
          </thead>
          <tbody>${body}</tbody>
        </table>
      </div>
      ${Array.isArray(mismatches) && mismatches.length > 100 ? `<div class='muted' style='margin-top:6px;'>Showing first 100 mismatches of ${escapeHtml(String(mismatches.length))}.</div>` : ""}
    `;
  }

  function getToastStableIdentityField(columns, rows) {
    const candidates = [
      { outputLabel: "Employee ID", sourceField: "Employee ID" },
      { outputLabel: "Employee", sourceField: "Employee" },
    ];
    for (const candidate of candidates) {
      const inColumns = columns.includes(candidate.sourceField);
      const inRows = rows.some(
        (row) =>
          row &&
          Object.prototype.hasOwnProperty.call(row, candidate.sourceField) &&
          row[candidate.sourceField] !== null &&
          row[candidate.sourceField] !== undefined &&
          String(row[candidate.sourceField]).trim() !== ""
      );
      if (inColumns || inRows) return candidate;
    }
    return null;
  }

  function renderToastOriginalTable(columns, rows) {
    const preferredColumns = [
      { header: "Employee", sources: ["Employee"] },
      { header: "Employee ID", sources: ["Employee ID"] },
      { header: "Job Title", sources: ["Job Title", "Department"] },
      { header: "Job Code", sources: ["Job Code"] },
      { header: "Hourly Rate", sources: ["Hourly Rate"] },
      { header: "Reg Hours", sources: ["Regular Hours"] },
      { header: "OT Hours", sources: ["Overtime Hours"] },
      { header: "Regular Pay", sources: ["Regular Pay"] },
      { header: "Overtime Pay", sources: ["Overtime Pay"] },
      { header: "Total Pay", sources: ["Total Pay"] },
      { header: "Net Sales", sources: ["Net Sales"] },
      { header: "Declared Tips", sources: ["Declared Tips"] },
      { header: "Non-Cash Tips", sources: ["Non-Cash Tips"] },
      { header: "Total Tips", sources: ["Total Tips"] },
      { header: "Tips Withheld", sources: ["Tips Withheld"] },
      { header: "Total Gratuity", sources: ["Total Gratuity"] },
      { header: "Location", sources: ["Location"] },
      { header: "Location Code", sources: ["Location Code"] },
    ];

    const displayColumns = preferredColumns.filter((col) =>
      col.sources.some((source) => columns.includes(source) || rows.some((r) => r && Object.prototype.hasOwnProperty.call(r, source)))
    );
    const coveredSources = new Set(displayColumns.flatMap((col) => col.sources));
    const extras = columns
      .filter((c) => !coveredSources.has(c) && c !== "Toast Employee ID")
      .map((c) => ({ header: c, sources: [c] }));
    const finalColumns = displayColumns.concat(extras);

    const head = finalColumns.map((col) => `<th>${escapeHtml(col.header)}</th>`).join("");
    const body = rows.length
      ? rows
          .map((row) => {
            const cells = finalColumns
              .map((col) => {
                const sourceKey = col.sources.find((source) => row && Object.prototype.hasOwnProperty.call(row, source));
                const value = sourceKey ? row[sourceKey] : "";
                const rendered =
                  value === null || value === undefined
                    ? ""
                    : typeof value === "object"
                    ? JSON.stringify(value)
                    : String(value);
                return `<td>${escapeHtml(rendered)}</td>`;
              })
              .join("");
            return `<tr>${cells}</tr>`;
          })
          .join("")
      : `<tr><td colspan="${Math.max(finalColumns.length, 1)}" class="muted">No rows returned for this pay period.</td></tr>`;

    const regularHoursTotal = rows.reduce((sum, row) => {
      const val = Number(row?.["Regular Hours"]);
      return sum + (Number.isFinite(val) ? val : 0);
    }, 0);
    const overtimeHoursTotal = rows.reduce((sum, row) => {
      const val = Number(row?.["Overtime Hours"]);
      return sum + (Number.isFinite(val) ? val : 0);
    }, 0);

    return {
      html: `
        <div class="tableScroll"><table class="toastOriginalRowsTable"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
        <div class="miniCard" style="margin-top:10px;">
          <div><span class="muted">Regular Hours Total:</span> <b>${escapeHtml(regularHoursTotal.toFixed(2))}</b></div>
          <div style="margin-top:4px;"><span class="muted">Overtime Hours Total:</span> <b>${escapeHtml(
            overtimeHoursTotal.toFixed(2)
          )}</b></div>
        </div>
      `,
      identityField: { outputLabel: "Employee ID", sourceField: "Employee ID" },
    };
  }

  function buildDepartmentHoursAudit(rows) {
    const list = Array.isArray(rows) ? rows : [];
    const byKey = new Map();

    list.forEach((row) => {
      const employeeId = String(row["Employee ID"] || "").trim();
      const employee = String(row["Employee"] || "").trim();
      const department = String(row["Department"] || row["Job Title"] || "").trim();
      const jobCode = String(row["Job Code"] || "").trim();

      const employeeKey = employeeId || employee || "__unknown_employee__";
      const deptKey = jobCode || department || "__unknown_department__";
      const key = `${employeeKey}|||${deptKey}`;

      if (!byKey.has(key)) {
        byKey.set(key, {
          Employee: employee || null,
          "Employee ID": employeeId || null,
          Department: department || null,
          "Job Code": jobCode || null,
          "Regular Hours": 0,
          "Overtime Hours": 0,
        });
      }

      const agg = byKey.get(key);
      agg["Regular Hours"] += Number(row["Regular Hours"] || 0);
      agg["Overtime Hours"] += Number(row["Overtime Hours"] || 0);
    });

    return Array.from(byKey.values()).map((row) => ({
      ...row,
      "Regular Hours": Number(row["Regular Hours"].toFixed(2)),
      "Overtime Hours": Number(row["Overtime Hours"].toFixed(2)),
      "Total Hours": Number((row["Regular Hours"] + row["Overtime Hours"]).toFixed(2)),
    }));
  }

  function compareDepartmentHours(apiRows, csvRows) {
    const apiAudit = buildDepartmentHoursAudit(apiRows);
    const csvAudit = buildDepartmentHoursAudit(csvRows);

    const apiMap = new Map();
    const csvMap = new Map();

    apiAudit.forEach((row) => {
      const key = `${String(row["Employee ID"] || row.Employee || "").toLowerCase()}|||${String(row["Job Code"] || row.Department || "").toLowerCase()}`;
      apiMap.set(key, row);
    });

    csvAudit.forEach((row) => {
      const key = `${String(row["Employee ID"] || row.Employee || "").toLowerCase()}|||${String(row["Job Code"] || row.Department || "").toLowerCase()}`;
      csvMap.set(key, row);
    });

    const allKeys = new Set([...apiMap.keys(), ...csvMap.keys()]);
    const rows = [];

    allKeys.forEach((key) => {
      const api = apiMap.get(key) || null;
      const csv = csvMap.get(key) || null;

      rows.push({
        Employee: api?.Employee || csv?.Employee || null,
        "Employee ID": api?.["Employee ID"] || csv?.["Employee ID"] || null,
        Department: api?.Department || csv?.Department || null,
        "Job Code": api?.["Job Code"] || csv?.["Job Code"] || null,
        "API Regular Hours": api?.["Regular Hours"] ?? null,
        "CSV Regular Hours": csv?.["Regular Hours"] ?? null,
        "API Overtime Hours": api?.["Overtime Hours"] ?? null,
        "CSV Overtime Hours": csv?.["Overtime Hours"] ?? null,
        "API Total Hours": api?.["Total Hours"] ?? null,
        "CSV Total Hours": csv?.["Total Hours"] ?? null,
        matches:
          api &&
          csv &&
          Number(api["Regular Hours"] || 0).toFixed(2) === Number(csv["Regular Hours"] || 0).toFixed(2) &&
          Number(api["Overtime Hours"] || 0).toFixed(2) === Number(csv["Overtime Hours"] || 0).toFixed(2),
      });
    });

    return rows.sort((a, b) => {
      const emp = String(a["Employee ID"] || "").localeCompare(String(b["Employee ID"] || ""));
      if (emp !== 0) return emp;
      return String(a.Department || "").localeCompare(String(b.Department || ""));
    });
  }

  function renderDepartmentAuditTable(apiRows, csvRows) {
    const rows = compareDepartmentHours(apiRows, csvRows);
    const ordered = rows.slice().sort((a, b) => {
      if (a.matches === b.matches) {
        const emp = String(a["Employee ID"] || "").localeCompare(String(b["Employee ID"] || ""));
        if (emp !== 0) return emp;
        return String(a.Department || "").localeCompare(String(b.Department || ""));
      }
      return a.matches ? 1 : -1;
    });

    const body = ordered.length
      ? ordered
          .map((row) => {
            return `
              <tr>
                <td>${escapeHtml(String(row.Employee || ""))}</td>
                <td>${escapeHtml(String(row["Employee ID"] || ""))}</td>
                <td>${escapeHtml(String(row.Department || ""))}</td>
                <td>${escapeHtml(String(row["Job Code"] || ""))}</td>
                <td>${escapeHtml(String(row["API Regular Hours"] ?? ""))}</td>
                <td>${escapeHtml(String(row["CSV Regular Hours"] ?? ""))}</td>
                <td>${escapeHtml(String(row["API Overtime Hours"] ?? ""))}</td>
                <td>${escapeHtml(String(row["CSV Overtime Hours"] ?? ""))}</td>
                <td>${escapeHtml(String(row["API Total Hours"] ?? ""))}</td>
                <td>${escapeHtml(String(row["CSV Total Hours"] ?? ""))}</td>
                <td>${row.matches ? pill("MATCH", "ok") : pill("CHECK", "warn")}</td>
              </tr>
            `;
          })
          .join("")
      : `<tr><td colspan="11" class="muted">No employee + department totals available to compare.</td></tr>`;

    return `
      <div class="sectionTitle">Outcome Audit: Employee + Department Hours</div>
      <p class="sectionHelp">This is the important audit. It compares total regular and overtime hours by employee + department. It does not care about line count.</p>
      <div class="tableScroll">
        <table>
          <thead>
            <tr>
              <th>Employee</th>
              <th>Employee ID</th>
              <th>Department</th>
              <th>Job Code</th>
              <th>API Regular Hours</th>
              <th>CSV Regular Hours</th>
              <th>API Overtime Hours</th>
              <th>CSV Overtime Hours</th>
              <th>API Total Hours</th>
              <th>CSV Total Hours</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>${body}</tbody>
        </table>
      </div>
    `;
  }

  function normalizeCsvHeaderKey(header) {
    return String(header || "")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9]/g, "");
  }

  function createStep1CsvFieldAccessor(row) {
    const source = row && typeof row === "object" ? row : {};
    const keyToValue = new Map();
    Object.entries(source).forEach(([key, value]) => {
      keyToValue.set(normalizeCsvHeaderKey(key), value);
    });
    return (aliases) => {
      for (const alias of aliases) {
        if (Object.prototype.hasOwnProperty.call(source, alias)) return source[alias];
        const normalizedAlias = normalizeCsvHeaderKey(alias);
        if (keyToValue.has(normalizedAlias)) return keyToValue.get(normalizedAlias);
      }
      return "";
    };
  }

  function formatToTwoDecimalsIfNumeric(value) {
      if (value === null || value === undefined) return "";
      const raw = String(value).trim();
      if (!raw) return "";
      const numericCandidate = raw.replace(/[$,%\s]/g, "").replace(/,/g, "");
      const parsed = Number(numericCandidate);
      if (!Number.isFinite(parsed)) return raw;
      return parsed.toFixed(2);
  }

  function normalizeEarningsRow(rawRow) {
    const getFieldValue = createStep1CsvFieldAccessor(rawRow);
    return {
      employee: getFieldValue(["Employee", "employee", "employee_name", "name"]),
      employeeId: getFieldValue(["Employee ID", "employee_id", "employeeId"]),
      employeeGuid: getFieldValue(["Toast Employee GUID", "toast_employee_guid", "employee_guid", "employeeGuid"]),
      jobTitle: getFieldValue(["Job Title", "job_title", "jobTitle", "department"]),
      jobCode: getFieldValue(["Job Code", "job_code", "jobCode"]),
      hourlyRate: formatToTwoDecimalsIfNumeric(getFieldValue(["Hourly Rate", "hourly_rate", "hourlyRate", "rate"])),
      regHours: formatToTwoDecimalsIfNumeric(getFieldValue(["Regular Hours", "regular_hours", "regularHours", "reg_hours"])),
      otHours: formatToTwoDecimalsIfNumeric(getFieldValue(["Overtime Hours", "overtime_hours", "overtimeHours", "ot_hours"])),
    };
  }

  function renderEarningsRowsTable(rows, emptyLabel) {
    const normalizedRows = (Array.isArray(rows) ? rows : []).map(normalizeEarningsRow);
    const columns = [
      { header: "Employee", key: "employee" },
      { header: "Employee ID", key: "employeeId" },
      { header: "Job Title", key: "jobTitle" },
      { header: "Job Code", key: "jobCode" },
      { header: "Hourly Rate", key: "hourlyRate" },
      { header: "Reg Hours", key: "regHours" },
      { header: "OT Hours", key: "otHours" },
    ];
    const head = columns.map((c) => `<th>${escapeHtml(c.header)}</th>`).join("");
    const body = normalizedRows.length
      ? normalizedRows
          .map((row) => {
            const cells = columns
              .map((col) => {
                const align = col.key === "employee" ? "left" : "center";
                const value = row[col.key] === null || row[col.key] === undefined ? "" : String(row[col.key]);
                return `<td style="text-align:${align};">${escapeHtml(value)}</td>`;
              })
              .join("");
            return `<tr>${cells}</tr>`;
          })
          .join("")
      : `<tr><td colspan="${columns.length}" class="muted">${escapeHtml(emptyLabel)}</td></tr>`;
    return `<div class="tableScroll"><table class="toastOriginalRowsTable"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
  }

  function toNumericComparisonValue(value) {
    if (value === null || value === undefined) return 0;
    if (typeof value === "number") return Number.isFinite(value) ? value : 0;
    const cleaned = String(value)
      .trim()
      .replace(/[$,%\s]/g, "")
      .replace(/,/g, "");
    const parsed = Number(cleaned);
    return Number.isFinite(parsed) ? parsed : 0;
  }

  function formatComparisonNumber(value) {
    return toNumericComparisonValue(value).toFixed(2);
  }

  function normalizeComparisonKeyPart(value) {
    return String(value || "").trim().toLowerCase();
  }

  function normalizeNameForComparison(value) {
    return String(value || "")
      .toLowerCase()
      .trim()
      .replace(/[^\w\s]/g, " ")
      .replace(/\s+/g, " ");
  }

  function buildNameVariants(value) {
    const normalized = normalizeNameForComparison(value);
    if (!normalized) return [];
    const parts = normalized.split(" ").filter(Boolean);
    if (!parts.length) return [];
    const base = parts.join(" ");
    if (parts.length === 1) return [base];
    const flipped = [parts[parts.length - 1], ...parts.slice(0, -1)].join(" ");
    return Array.from(new Set([base, flipped]));
  }

  function sanitizeComparableValue(value) {
    const raw = String(value || "").trim();
    if (!raw) return "";
    const lowered = raw.toLowerCase();
    if (["null", "undefined"].includes(lowered)) return "";
    return raw;
  }

  function sanitizeEmployeeIdForComparison(value) {
    const raw = sanitizeComparableValue(value);
    if (!raw) return { value: "", issue: "Missing Employee ID" };
    const lowered = raw.toLowerCase();
    if (lowered === "missing employee id") return { value: "", issue: "Missing Employee ID" };
    if (["delete", "deleted", "n/a", "na"].includes(lowered)) return { value: "", issue: "Invalid Employee ID" };
    return { value: raw, issue: "" };
  }

  function sanitizeJobCodeForComparison(value) {
    const raw = sanitizeComparableValue(value);
    if (!raw) return { value: "", issue: "Missing Job Code" };
    const lowered = raw.toLowerCase();
    if (lowered === "missing job code") return { value: "", issue: "Missing Job Code" };
    return { value: raw, issue: "" };
  }

  function buildIssueLabel(employeeIdIssue, jobCodeIssue) {
    const parts = [];
    if (employeeIdIssue) parts.push(employeeIdIssue);
    if (jobCodeIssue) parts.push(jobCodeIssue);
    return parts.join(" and ");
  }

  function buildExcludedMatchers(excludedRows) {
    const active = (Array.isArray(excludedRows) ? excludedRows : []).filter((row) => row && row.active !== false);
    const byGuid = new Map();
    const byEmployeeId = new Map();
    const byName = new Map();
    active.forEach((row) => {
      const reason = [row.reason, row.notes].filter(Boolean).join(" / ").trim() || "Excluded";
      const guidKey = normalizeComparisonKeyPart(
        row.toast_employee_guid || row.toastEmployeeGuid || row.employee_guid || row.employeeGuid || ""
      );
      const employeeIdKey = normalizeComparisonKeyPart(row.employee_id || row.employeeId || "");
      const nameVariants = buildNameVariants(row.employee_name || row.employeeName || "");
      if (guidKey && !byGuid.has(guidKey)) byGuid.set(guidKey, reason);
      if (employeeIdKey && !byEmployeeId.has(employeeIdKey)) byEmployeeId.set(employeeIdKey, reason);
      nameVariants.forEach((nameKey) => {
        if (nameKey && !byName.has(nameKey)) byName.set(nameKey, reason);
      });
    });
    return { byGuid, byEmployeeId, byName };
  }

  function mergeExcludedDisplayRows(rows) {
    const merged = new Map();
    (Array.isArray(rows) ? rows : []).forEach((row) => {
      const key = [
        normalizeComparisonKeyPart(row.employeeId || ""),
        normalizeComparisonKeyPart(row.jobCode || ""),
        normalizeComparisonKeyPart(row.employee || ""),
        normalizeComparisonKeyPart(row.jobTitle || ""),
        normalizeComparisonKeyPart(row.exclusionReason || ""),
      ].join("|||");
      if (!merged.has(key)) {
        merged.set(key, {
          employee: row.employee || "",
          employeeId: row.employeeId || "",
          jobTitle: row.jobTitle || "",
          jobCode: row.jobCode || "",
          csvRegHours: null,
          csvOtHours: null,
          apiRegHours: null,
          apiOtHours: null,
          exclusionReason: row.exclusionReason || "Excluded",
        });
      }
      const target = merged.get(key);
      if (row.source === "CSV") {
        target.csvRegHours = row.regHours;
        target.csvOtHours = row.otHours;
      } else if (row.source === "API") {
        target.apiRegHours = row.regHours;
        target.apiOtHours = row.otHours;
      }
    });

    return Array.from(merged.values()).map((row) => {
      const hasCsv = row.csvRegHours !== null || row.csvOtHours !== null;
      const hasApi = row.apiRegHours !== null || row.apiOtHours !== null;
      const source = hasCsv && hasApi ? "CSV + API" : hasCsv ? "CSV" : "API";
      const regHours =
        hasCsv && hasApi
          ? `CSV ${formatComparisonNumber(row.csvRegHours)} | API ${formatComparisonNumber(row.apiRegHours)}`
          : hasCsv
          ? formatComparisonNumber(row.csvRegHours)
          : formatComparisonNumber(row.apiRegHours);
      const otHours =
        hasCsv && hasApi
          ? `CSV ${formatComparisonNumber(row.csvOtHours)} | API ${formatComparisonNumber(row.apiOtHours)}`
          : hasCsv
          ? formatComparisonNumber(row.csvOtHours)
          : formatComparisonNumber(row.apiOtHours);
      return {
        employee: row.employee,
        employeeId: row.employeeId,
        jobTitle: row.jobTitle,
        jobCode: row.jobCode,
        source,
        regHours,
        otHours,
        exclusionReason: row.exclusionReason,
      };
    });
  }

  function groupEarningsRowsForComparison(rows) {
    const map = new Map();
    const normalizedRows = (Array.isArray(rows) ? rows : []).map(normalizeEarningsRow);

    normalizedRows.forEach((row) => {
      const employeeId = String(row.employeeId || "").trim();
      const jobCode = String(row.jobCode || "").trim();
      const key = `${normalizeComparisonKeyPart(employeeId)}|||${normalizeComparisonKeyPart(jobCode)}`;

      if (!map.has(key)) {
        map.set(key, {
          employee: String(row.employee || "").trim(),
          employeeId,
          jobTitle: String(row.jobTitle || "").trim(),
          jobCode,
          regHours: 0,
          otHours: 0,
          rateSum: 0,
          rateCount: 0,
        });
      }

      const group = map.get(key);
      if (!group.employee && row.employee) group.employee = String(row.employee || "").trim();
      if (!group.jobTitle && row.jobTitle) group.jobTitle = String(row.jobTitle || "").trim();
      group.regHours += toNumericComparisonValue(row.regHours);
      group.otHours += toNumericComparisonValue(row.otHours);
      const rate = toNumericComparisonValue(row.hourlyRate);
      if (rate > 0) {
        group.rateSum += rate;
        group.rateCount += 1;
      }
    });

    map.forEach((group) => {
      group.regHours = Number(group.regHours.toFixed(2));
      group.otHours = Number(group.otHours.toFixed(2));
      group.hourlyRate = group.rateCount > 0 ? Number((group.rateSum / group.rateCount).toFixed(2)) : null;
      delete group.rateSum;
      delete group.rateCount;
    });

    return map;
  }

  function compareEarningsGroups(csvRows, apiRows, excludedRows) {
    const hoursTolerance = 0.01;
    const rateTolerance = 0.01;
    const excludedMatchers = buildExcludedMatchers(excludedRows);
    const excludedFromComparisonRaw = [];
    const csvKeyIssues = [];
    const apiKeyIssues = [];
    const validCsvRows = [];
    const validApiRows = [];

    const classifyRows = (rows, sourceLabel, issueBucket, validBucket) => {
      const normalizedRows = (Array.isArray(rows) ? rows : []).map(normalizeEarningsRow);
      normalizedRows.forEach((row) => {
        const rawEmployeeGuid = String(row.employeeGuid || "").trim();
        const rawEmployeeId = String(row.employeeId || "").trim();
        const employeeName = String(row.employee || "").trim();
        const excludedReasonByName = buildNameVariants(employeeName)
          .map((nameVariant) => excludedMatchers.byName.get(nameVariant) || "")
          .find(Boolean);
        const excludedReason =
          excludedMatchers.byGuid.get(normalizeComparisonKeyPart(rawEmployeeGuid)) ||
          excludedMatchers.byEmployeeId.get(normalizeComparisonKeyPart(rawEmployeeId)) ||
          excludedReasonByName ||
          "";
        if (excludedReason) {
          excludedFromComparisonRaw.push({
            employee: employeeName,
            employeeId: rawEmployeeId,
            jobTitle: String(row.jobTitle || "").trim(),
            jobCode: String(row.jobCode || "").trim(),
            source: sourceLabel,
            regHours: toNumericComparisonValue(row.regHours),
            otHours: toNumericComparisonValue(row.otHours),
            exclusionReason: excludedReason,
          });
          return;
        }

        const employeeIdResult = sanitizeEmployeeIdForComparison(row.employeeId);
        const jobCodeResult = sanitizeJobCodeForComparison(row.jobCode);
        const issue = buildIssueLabel(employeeIdResult.issue, jobCodeResult.issue);
        if (issue) {
          issueBucket.push({
            employee: employeeName,
            employeeId: rawEmployeeId,
            jobTitle: String(row.jobTitle || "").trim(),
            jobCode: String(row.jobCode || "").trim(),
            hourlyRate: toNumericComparisonValue(row.hourlyRate),
            regHours: toNumericComparisonValue(row.regHours),
            otHours: toNumericComparisonValue(row.otHours),
            issue,
          });
          return;
        }

        validBucket.push({
          ...row,
          employeeId: employeeIdResult.value,
          jobCode: jobCodeResult.value,
        });
      });
    };

    classifyRows(csvRows, "CSV", csvKeyIssues, validCsvRows);
    classifyRows(apiRows, "API", apiKeyIssues, validApiRows);

    const csvMap = groupEarningsRowsForComparison(validCsvRows);
    const apiMap = groupEarningsRowsForComparison(validApiRows);
    const allKeys = new Set([...csvMap.keys(), ...apiMap.keys()]);
    const hourMismatches = [];
    const missingInApi = [];
    const missingInCsv = [];
    const rateReview = [];
    let csvRegTotal = 0;
    let apiRegTotal = 0;
    let csvOtTotal = 0;
    let apiOtTotal = 0;

    csvMap.forEach((row) => {
      csvRegTotal += row.regHours;
      csvOtTotal += row.otHours;
    });
    apiMap.forEach((row) => {
      apiRegTotal += row.regHours;
      apiOtTotal += row.otHours;
    });

    allKeys.forEach((key) => {
      const csv = csvMap.get(key) || null;
      const api = apiMap.get(key) || null;
      if (!api && csv) {
        missingInApi.push(csv);
        return;
      }
      if (!csv && api) {
        missingInCsv.push(api);
        return;
      }
      if (!csv || !api) return;

      const regVariance = Number((api.regHours - csv.regHours).toFixed(2));
      const otVariance = Number((api.otHours - csv.otHours).toFixed(2));
      if (Math.abs(regVariance) > hoursTolerance || Math.abs(otVariance) > hoursTolerance) {
        hourMismatches.push({
          employee: api.employee || csv.employee || "",
          employeeId: api.employeeId || csv.employeeId || "",
          jobTitle: api.jobTitle || csv.jobTitle || "",
          jobCode: api.jobCode || csv.jobCode || "",
          csvReg: csv.regHours,
          apiReg: api.regHours,
          regVariance,
          csvOt: csv.otHours,
          apiOt: api.otHours,
          otVariance,
        });
      }

      const csvRate = csv.hourlyRate;
      const apiRate = api.hourlyRate;
      const hasCsvRate = Number.isFinite(csvRate);
      const hasApiRate = Number.isFinite(apiRate);
      const rateVariance = hasCsvRate && hasApiRate ? Number((apiRate - csvRate).toFixed(2)) : null;
      const rateMismatch =
        (hasCsvRate && hasApiRate && Math.abs(rateVariance) > rateTolerance) ||
        (hasCsvRate !== hasApiRate);

      if (rateMismatch) {
        rateReview.push({
          employee: api.employee || csv.employee || "",
          employeeId: api.employeeId || csv.employeeId || "",
          jobTitle: api.jobTitle || csv.jobTitle || "",
          jobCode: api.jobCode || csv.jobCode || "",
          csvRate: hasCsvRate ? csvRate : null,
          apiRate: hasApiRate ? apiRate : null,
          rateVariance,
        });
      }
    });

    const csvGroupCount = csvMap.size;
    const apiGroupCount = apiMap.size;
    const rowVariance = apiGroupCount - csvGroupCount;
    const regVariance = Number((apiRegTotal - csvRegTotal).toFixed(2));
    const otVariance = Number((apiOtTotal - csvOtTotal).toFixed(2));

    return {
      hoursTolerance,
      rateTolerance,
      summary: {
        csvGroupCount,
        apiGroupCount,
        rowVariance,
        csvRegTotal: Number(csvRegTotal.toFixed(2)),
        apiRegTotal: Number(apiRegTotal.toFixed(2)),
        regVariance,
        csvOtTotal: Number(csvOtTotal.toFixed(2)),
        apiOtTotal: Number(apiOtTotal.toFixed(2)),
        otVariance,
        rateMismatchCount: rateReview.length,
      },
      excludedFromComparison: mergeExcludedDisplayRows(excludedFromComparisonRaw),
      csvKeyIssues,
      apiKeyIssues,
      hourMismatches,
      missingInApi,
      missingInCsv,
      rateReview,
    };
  }

  function renderComparisonSectionTable(title, columns, rows, opts = {}) {
    const { hideWhenEmpty = false, compactEmptyMessage = false, tone = "" } = opts;
    const safeRows = Array.isArray(rows) ? rows : [];
    if (hideWhenEmpty && !safeRows.length) return "";
    const head = columns.map((column) => `<th>${escapeHtml(column.header)}</th>`).join("");
    const body = safeRows.length
      ? safeRows
          .map((row) => {
            const cells = columns
                .map((column) => {
                const raw = row[column.key];
                const rendered =
                  column.numeric && raw !== null && raw !== undefined && String(raw).trim() !== ""
                    ? formatComparisonNumber(raw)
                    : column.numeric
                    ? ""
                    : String(raw || "");
                const align = column.align || "center";
                return `<td style="text-align:${align};">${escapeHtml(rendered)}</td>`;
              })
              .join("");
            return `<tr>${cells}</tr>`;
          })
          .join("")
      : "";

    if (!safeRows.length && compactEmptyMessage) {
      return `
        <div class="sectionTitle">${escapeHtml(title)}</div>
        <div class="muted" style="margin:4px 0 12px;">No exceptions found.</div>
      `;
    }

    return `
      <div class="sectionTitle ${tone ? escapeAttr(tone) : ""}">${escapeHtml(title)}</div>
      <div class="tableScroll">
        <table class="comparisonExceptionsTable">
          <thead><tr>${head}</tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
    `;
  }

    state.toastOriginalDebugLoading = false;
    state.toastOriginalCsvUploadBusy = false;
    state.toastOriginalCsvUploadError = "";
    state.toastOriginalCsvClearBusy = false;
    state.toastOriginalCsvClearError = "";
    state.toastOriginalComparison = null;
    state.toastOriginalCsvBaselineRowCount = 0;
    state.toastOriginalLastUploadPayload = null;
    state.toastOriginalLastApiLoadPayload = null;
    state.toastOriginalLastUploadResponse = null;
    state.toastOriginalLastApiLoadResponse = null;
    renderActiveToastAuditPage();

    const name = document.getElementById("locationSelect").value;
    if (!name) return;
    try {
      await loadRecapSnapshotForSelected();
    } catch (_err) {
      state.recap = null;
    }
    await loadExcludedSnapshotForLocation(name);

    const q = encodeURIComponent(name);
    const { resp, body } = await apiGet(`/staff/pay-period-selector?locationName=${q}`);
    if (!resp.ok) {
      state.toastOriginalLoadError = body.error || "selector_load_failed";
      state.toastOriginalSelector = { current_pay_period: null, next_pay_period: null, prior_pay_periods: [] };
      renderActiveToastAuditPage();
      return;

    const selector = body.selector || {};

    state.toastOriginalSelectionBucket = selector.default_selection?.bucket || "current";

    await loadToastOriginalCsvBaselineMeta();
    renderActiveToastAuditPage();
  }

  async function loadToastOriginalCsvBaselineMeta() {
    const selected = getSelectedToastOriginalPeriod();
    const locationName = document.getElementById("locationSelect").value;
    if (!locationName || !selected) {
      state.toastOriginalCsvBaseline = null;
      state.toastOriginalComparison = null;
      state.toastOriginalCsvBaselineRowCount = 0;
      return;
    }

    const query = new URLSearchParams({
      locationName,
      periodStart: selected.period_start,
      periodEnd: selected.period_end,
    });

    const { resp, body } = await apiGet(`/staff/toast-original-pay-period/baseline?${query.toString()}`);
    if (!resp.ok) {
      state.toastOriginalCsvBaseline = null;
      state.toastOriginalComparison = null;
      state.toastOriginalCsvBaselineRowCount = 0;
      return;
    }

    const baselineRows = extractToastOriginalCsvRows(body?.baseline);
    const fallbackBodyRows = extractToastOriginalCsvRows(body);
    state.toastOriginalCsvBaseline = body.baseline
      ? {
          ...body.baseline,
          normalized_rows: baselineRows.length ? baselineRows : fallbackBodyRows,
        }
      : null;
    state.toastOriginalComparison = body.comparison || null;
    state.toastOriginalCsvBaselineRowCount = (baselineRows.length ? baselineRows : fallbackBodyRows).length;
    renderActiveToastAuditPage();
  }

    const selected = getSelectedToastOriginalPeriod();
    const locationName = document.getElementById("locationSelect").value;
    if (!locationName) {
      alert("Select a location before continuing.");

    }
    if (!selected) {
      alert("Select a pay period before continuing.");
      state.toastOriginalLoadError = "no_selected_pay_period";
      renderActiveToastAuditPage();
      return;

    state.toastOriginalLoadError = "";

    state.toastOriginalLastApiLoadPayload = {
      location_name: locationName,
      period_start: selected.period_start,
      period_end: selected.period_end,
    };
    renderActiveToastAuditPage();

    try {
      const { resp, body } = await apiPost("/staff/toast-original-pay-period", state.toastOriginalLastApiLoadPayload);
      state.toastOriginalLastApiLoadResponse = { status: resp.status, error: body?.error || "" };

      if (!resp.ok) {
        state.toastOriginalLoadError = body.error || "toast_original_load_failed";
        state.toastOriginalData = null;
        state.toastOriginalComparison = body?.comparison || null;
        renderActiveToastAuditPage();
        return;

      state.toastOriginalData = body?.data || null;
      state.toastOriginalComparison = body?.comparison || null;
      if (Array.isArray(body?.comparison?.uploaded_csv_rows)) {
        state.toastOriginalCsvBaselineRowCount = body.comparison.uploaded_csv_rows.length;
      }

      await loadToastOriginalCsvBaselineMeta();
    } catch (err) {
      state.toastOriginalLoadError = (err && err.message) || "toast_original_load_failed";
      state.toastOriginalData = null;
      state.toastOriginalLastApiLoadResponse = { status: "network_error", error: state.toastOriginalLoadError };
    } finally {
      state.toastOriginalLoading = false;
      renderActiveToastAuditPage();

  async function uploadToastOriginalCsvBaseline() {
    const fileInput = document.getElementById("toastOriginalCsvFile");
    const selected = getSelectedToastOriginalPeriod();
    const locationName = document.getElementById("locationSelect").value;

    if (!locationName) {
      alert("Select a location before continuing.");
      return;
    }
    if (!selected) {
      alert("Select a pay period before continuing.");
      return;
    }
    if (!fileInput || !fileInput.files || !fileInput.files[0]) {
      alert("Choose a CSV file before uploading.");
      return;
    }

    state.toastOriginalCsvUploadBusy = true;
    state.toastOriginalCsvUploadError = "";
    state.toastOriginalCsvClearError = "";
    renderActiveToastAuditPage();

    try {
      const file = fileInput.files[0];
      const rawCsv = await file.text();
      state.toastOriginalLastUploadPayload = {
        location_name: locationName,
        period_start: selected.period_start,
        period_end: selected.period_end,
        raw_csv_length: rawCsv.length,
        file_name: file.name || "uploaded.csv",
      };
      const { resp, body } = await apiPost("/staff/toast-original-pay-period/baseline", {
        location_name: locationName,
        period_start: selected.period_start,
        period_end: selected.period_end,
        raw_csv: rawCsv,
        file_name: file.name || "uploaded.csv",
      });
      state.toastOriginalLastUploadResponse = { status: resp.status, error: body?.error || "" };

      if (!resp.ok) {
        state.toastOriginalCsvUploadError = body.error || "csv_upload_failed";
        renderActiveToastAuditPage();
        return;
      }

      const responseLevelRows = extractToastOriginalCsvRows(body);
      const normalizedRows = responseLevelRows.length ? responseLevelRows : extractToastOriginalCsvRows(body?.baseline);
      const returnedBaseline = body?.baseline || body?.upload || {};
      state.toastOriginalCsvBaseline = {
        ...returnedBaseline,
        file_name: returnedBaseline.file_name || file.name || "uploaded.csv",
        normalized_rows: normalizedRows,
      };
      state.toastOriginalCsvBaselineRowCount = normalizedRows.length;
      if (body?.comparison) {
        state.toastOriginalComparison = body.comparison;
      }
      fileInput.value = "";
      renderActiveToastAuditPage();
    } catch (err) {
      state.toastOriginalCsvUploadError = (err && err.message) || "csv_upload_failed";
      state.toastOriginalLastUploadResponse = { status: "network_error", error: state.toastOriginalCsvUploadError };
    } finally {
      state.toastOriginalCsvUploadBusy = false;
      renderActiveToastAuditPage();
    }
  }

  async function clearToastOriginalCsvBaseline() {
    const selected = getSelectedToastOriginalPeriod();
    const locationName = document.getElementById("locationSelect").value;

    if (!locationName) {
      alert("Select a location before continuing.");
      return;
    }
    if (!selected) {
      alert("Select a pay period before continuing.");
      return;
    }
    if (!state.toastOriginalCsvBaseline) return;

    const confirmed = window.confirm("Clear the uploaded CSV baseline for this location and pay period?");
    if (!confirmed) return;

    state.toastOriginalCsvClearBusy = true;
    state.toastOriginalCsvClearError = "";
    renderActiveToastAuditPage();

    try {
      const { resp, body } = await apiDelete("/staff/toast-original-pay-period/baseline", {
        location_name: locationName,
        period_start: selected.period_start,
        period_end: selected.period_end,
      });
      if (!resp.ok) {
        state.toastOriginalCsvClearError = body.error || "csv_clear_failed";
        renderActiveToastAuditPage();
        return;
      }

      state.toastOriginalCsvBaseline = null;
      state.toastOriginalComparison = null;
      state.toastOriginalCsvBaselineRowCount = 0;
      state.toastOriginalLastUploadResponse = null;
      state.toastOriginalCsvUploadError = "";
      renderActiveToastAuditPage();
    } catch (err) {
      state.toastOriginalCsvClearError = (err && err.message) || "csv_clear_failed";
    } finally {
      state.toastOriginalCsvClearBusy = false;
      renderActiveToastAuditPage();
    }
  }
