<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RDMS Payroll Validation</title>
    <style>
      :root {
        --bg: #f5f5f5;
        --card: #ffffff;
        --muted: #6b7280;
        --text: #111111;
        --border: rgba(17, 17, 17, 0.12);
        --pill: rgba(17, 17, 17, 0.04);
        --ok: rgba(46, 204, 113, 0.18);
        --warn: rgba(241, 196, 15, 0.18);
        --bad: rgba(231, 76, 60, 0.18);
        --focus-ring: rgba(75, 85, 99, 0.45);
        --shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        color: var(--text);
      }
      .wrap {
        width: min(2000px, 100%);
        margin: 0 auto;
        padding: 18px 16px 44px;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px 14px;
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        backdrop-filter: blur(10px);
      }
      .brand {
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      .center {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .location {
        width: min(520px, 100%);
        display: flex;
        gap: 10px;
        align-items: center;
      }
      select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        outline: none;
      }
      option {
        color: #111;
      }
      .userbox {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
      }
      .btn {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        cursor: pointer;
      }
      .btn:hover {
        background: #f3f4f6;
      }
      .btn.primary {
        background: #111111;
        border-color: #111111;
        color: #ffffff;
      }
      .btn.primary:hover {
        background: #1f2937;
      }
      .btn.danger {
        background: #dc2626;
        border-color: #dc2626;
        color: #ffffff;
      }
      .btn.danger:hover {
        background: #b91c1c;
      }
      .tabs {
        margin-top: 14px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .tabs.submenu {
        margin-top: 8px;
      }
      .tabs.submenu.hidden {
        display: none;
      }
      .tab {
        border: 1px solid var(--border);
        background: #f9fafb;
        padding: 10px 12px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 13px;
        color: var(--muted);
      }
      .tab.active {
        background: #111111;
        border-color: #111111;
        color: #ffffff;
      }
      .page {
        margin-top: 14px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .pagetitle {
        padding: 16px 18px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-size: 18px;
      }
      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .content {
        padding: 16px 18px 18px;
        min-width: 0;
        overflow-x: visible;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: #ffffff;
      }
      th,
      td {
        padding: 10px 10px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
        font-size: 13px;
      }
      th {
        text-align: left;
        color: var(--muted);
        font-weight: 600;
        background: #f9fafb;
      }
      .toastOriginalRowsTable th {
        text-align: center;
        color: #374151;
        background: #f3f4f6;
        border-bottom: 2px solid rgba(17, 17, 17, 0.18);
      }
      .toastOriginalRowsTable td {
        text-align: center;
        vertical-align: middle;
        padding: 8px 10px;
      }
      .toastOriginalRowsTable td:first-child {
        text-align: left;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        font-size: 12px;
      }
      .pill {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--pill);
        font-size: 12px;
      }
      .pill.ok {
        background: var(--ok);
      }
      .pill.warn {
        background: var(--warn);
      }
      .pill.bad {
        background: var(--bad);
      }
      .input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        outline: none;
      }
      .yesNoControl {
        width: 84px;
        min-width: 84px;
        padding: 6px 8px;
      }
      .thWrap {
        white-space: normal;
        line-height: 1.2;
      }
      .thYesNo {
        text-align: center;
      }
      .tdYesNo {
        text-align: center;
      }
      .saveCol {
        text-align: center;
      }
      .saveBtnCompact {
        padding: 8px 10px;
        min-width: 68px;
      }
      .late {
        margin-top: 12px;
        padding: 12px 14px;
        border: 1px solid rgba(241, 196, 15, 0.35);
        border-radius: 14px;
        background: rgba(241, 196, 15, 0.1);
        color: var(--text);
        display: none;
      }
      .muted {
        color: var(--muted);
      }
      .sectionTitle {
        margin: 18px 0 8px;
        font-size: 15px;
        font-weight: 700;
      }
      .sectionTitle.info {
        color: #1d4ed8;
      }
      .sectionHelp {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 13px;
      }
      .sourceNote {
        color: var(--muted);
        font-size: 12px;
      }
      .loading {
        color: var(--muted);
        font-size: 13px;
      }
      .helperPanel {
        margin-bottom: 12px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #f9fafb;
      }
      .helperPanelTitle {
        margin: 0 0 6px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: var(--muted);
      }
      .helperList {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 5px;
        font-size: 13px;
      }
      .helperList li {
        color: var(--muted);
      }
      .helperList b {
        color: var(--text);
      }
      .stack {
        display: grid;
        gap: 14px;
        min-width: 0;
      }
      .panel {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #ffffff;
        padding: 14px;
        min-width: 0;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .searchResults {
        margin-top: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        max-height: 220px;
        overflow-y: auto;
      }
      .searchItem {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .searchItem:last-child {
        border-bottom: none;
      }
      .searchPrimary {
        font-size: 13px;
      }
      .searchSecondary {
        margin-top: 2px;
        font-size: 12px;
      }
      .searchHint {
        margin-top: 8px;
        font-size: 13px;
        color: var(--muted);
      }
      .gridTwo {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }
      .miniCard {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        background: #ffffff;
      }
      .tableScroll {
        width: 100%;
        overflow: auto;
        max-width: 100%;
        max-height: 62vh;
        border: 1px solid var(--border);
        border-radius: 14px;
        overscroll-behavior-x: contain;
        -webkit-overflow-scrolling: touch;
      }
      .tableScroll table {
        width: max-content;
        min-width: max(1100px, 100%);
        border: none;
        border-radius: 0;
      }
      .tableScroll table.internalValidationTable {
        width: 100%;
        min-width: 1200px;
        table-layout: fixed;
      }
      .internalValidationTable .whatChecksCol {
        width: 320px;
        max-width: 360px;
      }
      .internalValidationTable .whatChecksCell {
        text-align: left;
        vertical-align: top;
      }
      .internalValidationTable .whatChecksCell .defClamp {
        display: block;
        -webkit-line-clamp: unset;
        max-height: none;
        overflow: visible;
        line-height: 1.35;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: normal;
      }
      .toastOriginalDataPanel {
        overflow-x: hidden;
      }
      .toastOriginalControlsPanel {
        overflow-x: hidden;
      }
      .auditLightBlueField {
        background-color: #eaf4ff;
        border-color: #8bb8e8;
        color: #111111;
      }
      .auditUploadFieldWrap {
        border: 1px solid #8bb8e8;
        border-radius: 10px;
        background-color: #eaf4ff;
        padding: 10px;
      }
      .statusCard {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        background: #ffffff;
      }
      .statusCard.matched {
        border-color: rgba(46, 204, 113, 0.45);
        background: rgba(46, 204, 113, 0.1);
      }
      .statusCard.review {
        border-color: rgba(241, 196, 15, 0.45);
        background: rgba(241, 196, 15, 0.12);
      }
      .statusCard.problem {
        border-color: rgba(231, 76, 60, 0.45);
        background: rgba(231, 76, 60, 0.12);
      }
      .statusCardTitle {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .statusCardValue {
        font-size: 20px;
        font-weight: 700;
      }
      .summaryGrid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
      .summaryMetric {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.03);
        padding: 8px 10px;
      }
      .summaryMetricLabel {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .summaryMetricValue {
        margin-top: 4px;
        font-size: 17px;
        font-weight: 700;
      }
      .comparisonTilesGrid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(4, minmax(180px, 1fr));
      }
      @media (max-width: 1100px) {
        .comparisonTilesGrid {
          grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }
      }
      .comparisonTile {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        background: #ffffff;
      }
      .comparisonTile.positive {
        border-color: rgba(46, 204, 113, 0.45);
        background: rgba(46, 204, 113, 0.1);
      }
      .comparisonTile.negative {
        border-color: rgba(231, 76, 60, 0.45);
        background: rgba(231, 76, 60, 0.12);
      }
      .comparisonTile.caution {
        border-color: rgba(241, 196, 15, 0.45);
        background: rgba(241, 196, 15, 0.12);
      }
      .comparisonTileTitle {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .comparisonTileStatus {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .comparisonTileLine {
        font-size: 13px;
        color: #374151;
        margin-top: 2px;
      }
      .comparisonExceptionsTable th {
        text-align: center;
      }
      .comparisonExceptionsTable td {
        text-align: center;
      }
      .comparisonExceptionsTable td:first-child {
        text-align: left;
      }
      .debugSection {
        margin-top: 10px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fafafa;
      }
      .debugSection > summary {
        cursor: pointer;
        padding: 10px 12px;
        font-weight: 600;
      }
      .debugSectionBody {
        padding: 0 12px 12px;
      }
      .defClamp {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 4;
        overflow: hidden;
        line-height: 1.35;
        max-height: 5.4em;
      }
      .defTip {
        position: relative;
      }
      .defTip:hover::after {
        content: attr(data-full);
        position: absolute;
        left: 0;
        top: 100%;
        margin-top: 8px;
        width: min(640px, 70vw);
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 12px;
        color: var(--text);
        box-shadow: var(--shadow);
        z-index: 50;
        white-space: normal;
      }
      .defTip:hover::before {
        content: "";
        position: absolute;
        left: 18px;
        top: 100%;
        margin-top: 2px;
        border: 8px solid transparent;
        border-bottom-color: #ffffff;
        z-index: 51;
      }
      select:focus,
      .input:focus,
      .btn:focus-visible,
      .tab:focus-visible {
        border-color: rgba(75, 85, 99, 0.45);
        box-shadow: 0 0 0 3px var(--focus-ring);
      }
    </style>

    <div class="center">
      <div class="location">

  <div class="tabs" id="mainTabs"></div>

<script>
  function escapeHtml(s) {
    return String(s || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeAttr(s) {
    return escapeHtml(s).replaceAll("`", "&#096;");
  }

  const state = {
    tab: "dashboard",
    locations: [],
    recap: null,
    rules: null,
    rulesLocationName: null,
    clientRules: null,
    clientRulesLocationName: null,
    communicationRecipients: null,
    communicationLocationName: null,
    communicationRowEdits: {},
    communicationRowMessages: {},
    excluded: [],
    excludedLocationName: null,
    employeeSearchResults: [],
    selectedSearchEmployeeId: null,
    excludedSearchQuery: "",
    excludedSearchLoading: false,
    excludedHasSearched: false,
    excludedDraftReason: "",
    excludedDraftNote: "",
    outcomeSelector: null,
    outcomeSelectionBucket: "",
    outcomeSelectionPriorRecordId: "",
    outcomeResult: null,
    outcomeRunError: "",
    outcomeRunning: false,
    toastOriginalSelector: null,
    toastOriginalSelectionBucket: "",
    toastOriginalSelectionPriorRecordId: "",
    toastOriginalData: null,
    toastOriginalDebugData: null,
    toastOriginalLoadError: "",
    toastOriginalLoading: false,
    toastOriginalDebugLoading: false,
    toastOriginalCsvUploadBusy: false,
    toastOriginalCsvUploadError: "",
    toastOriginalCsvClearBusy: false,
    toastOriginalCsvClearError: "",
    toastOriginalCsvBaseline: null,
    toastOriginalComparison: null,
    toastOriginalCsvBaselineRowCount: 0,
    toastOriginalLastUploadPayload: null,
    toastOriginalLastApiLoadPayload: null,
    toastOriginalLastUploadResponse: null,
    toastOriginalLastApiLoadResponse: null,
    earningsWipOverrideConfirmed: false,
    dashboardRows: null,
    dashboardLoading: false,
    dashboardError: "",
    dashboardLastRefreshedAt: null,
  };
  let excludedSearchDebounceTimer = null;

  const NAV_CONFIG = [
    { key: "dashboardMain", label: "Payroll Dashboard", tabs: [] },
    { key: "setup", label: "Setup", tabs: ["excluded", "confirmations", "communicationSetup"] },
    { key: "payrollValidation", label: "Payroll Validation", tabs: ["rules", "outcome", "clientValidationConfig"] },
    { key: "earningsAuditMain", label: "Earnings Audit", tabs: ["toastOriginal", "earningsAudit", "earningsComparison", "earningsWipExport"] },
    { key: "tipsAudit", label: "Tips Audit", tabs: ["tipImport"] },
    { key: "reportsMain", label: "Reports", tabs: ["payrollExport", "reports"] },
  ];

  const TAB_META = {
    dashboard: {
      label: "Payroll Dashboard",
      main: "dashboardMain",
      subtitle: "Active payrolls from pay period end date through submit date.",
      existing: true,
    },
    excluded: {
      label: "Employee Exemptions",
      main: "setup",
      subtitle: "Manage a short list of staff to skip or handle differently in payroll validation.",
      existing: true,
    },
    confirmations: {
      label: "Airtable Setup Audit",
      main: "setup",
      subtitle: "Pick a location to see every required field in one place.",
      existing: true,
    },
    communicationSetup: {
      label: "Communication Setup",
      main: "setup",
      subtitle: "Choose which preview contacts should receive client validation emails.",
      existing: true,
    },
    rules: {
      label: "Internal Validation Config",
      main: "payrollValidation",
      subtitle: "Control which payroll validation rules are live for this location.",
      existing: true,
    },
    outcome: {
      label: "Internal Validation Report",
      main: "payrollValidation",
      subtitle: "Run payroll validation for a selected pay period and review the outcome.",
      existing: true,
    },
    clientValidationConfig: {
      label: "Client Validation Config",
      main: "payrollValidation",
      subtitle: "Control which validation rules are included in client-facing payroll validation emails.",
      existing: true,
    },
    toastOriginal: {
      label: "Step 1: POS Import",
      main: "earningsAuditMain",
      subtitle: "Confirm pay period, upload POS payroll CSV, and review normalized uploaded rows.",
      existing: true,
    },
    earningsAudit: {
      label: "Step 2: Earnings Audit",
      main: "earningsAuditMain",
      subtitle: "Load and review Original Toast pay period rows from API.",
      existing: true,
    },
    earningsComparison: {
      label: "Step 3: Earnings Comparison",
      main: "earningsAuditMain",
      subtitle: "Coming soon. This page will compare Step 1 uploads to Step 2 API rows.",
      existing: true,
    },
    earningsWipExport: {
      label: "Step 4: Earnings WIP Export",
      main: "earningsAuditMain",
      subtitle: "Review the payroll export format, confirm comparison status, then export the Earnings WIP file.",
      existing: true,
    },
    tipImport: {
      label: "Step 3: Tip Import",
      main: "tipsAudit",
      subtitle: "Coming soon.",
      existing: false,
    },
    payrollExport: {
      label: "Step 4: Payroll Export",
      main: "reportsMain",
      subtitle: "Coming soon.",
      existing: false,
    },
    reports: {
      label: "RDMS Payroll Reports",
      main: "reportsMain",
      subtitle: "Coming soon.",
      existing: true,
    },
  };

  function renderMainTabs(activeMain) {
    const mainTabsEl = document.getElementById("mainTabs");
    mainTabsEl.innerHTML = NAV_CONFIG.map((item) => {
      const active = item.key === activeMain ? " active" : "";
      return `<div class="tab${active}" data-main="${escapeAttr(item.key)}">${escapeHtml(item.label)}</div>`;
    }).join("");
  }

  function renderSubTabs(activeMain, activeTab) {
    const subTabsEl = document.getElementById("subTabs");
    const section = NAV_CONFIG.find((item) => item.key === activeMain);
    const tabs = (section && section.tabs) || [];

    if (!tabs.length) {
      subTabsEl.innerHTML = "";
      subTabsEl.classList.add("hidden");
      return;
    }

    subTabsEl.classList.remove("hidden");
    subTabsEl.innerHTML = tabs
      .map((tabKey) => {
        const active = tabKey === activeTab ? " active" : "";
        const meta = TAB_META[tabKey];
        return `<div class="tab${active}" data-tab="${escapeAttr(tabKey)}">${escapeHtml(meta.label)}</div>`;
      })
      .join("");
  }

  function renderComingSoonPage(label) {
    document.getElementById("pageSub").textContent = "Coming soon.";
    document.getElementById("content").innerHTML = `<div><div class="sectionTitle">${escapeHtml(
      label
    )}</div><div class="muted">Coming soon.</div></div>`;
  }

  function setActiveTab(tab) {
    const meta = TAB_META[tab] || TAB_META.dashboard;
    const nextTab = TAB_META[tab] ? tab : "dashboard";
    state.tab = nextTab;

    renderMainTabs(meta.main);
    renderSubTabs(meta.main, nextTab);

    document.getElementById("pageTitle").textContent = meta.label;
    document.getElementById("lateNotice").style.display = "none";
    document.getElementById("pageSub").textContent = meta.subtitle;

    if (nextTab === "confirmations") {
      renderConfirmations();
      return;
    }

    if (nextTab === "dashboard") {
      loadPayrollDashboard();
      return;
    }

    if (nextTab === "rules") {
      loadRulesForSelected();
      return;
    }

    if (nextTab === "excluded") {
      loadExcludedForSelected();
      return;
    }

    if (nextTab === "communicationSetup") {
      loadCommunicationSetupForSelected();
      return;
    }

    if (nextTab === "outcome") {
      loadOutcomeSelectorForSelected();
      return;
    }

    if (nextTab === "clientValidationConfig") {
      loadClientRulesForSelected();
      return;
    }

  function pill(text, klass) {
    return `<span class="pill ${klass}">${escapeHtml(text)}</span>`;
  }

  function truthyYesNo(val) {
    if (typeof val === "boolean") return val ? "YES" : "NO";
    if (val === null || val === undefined) return "";
    const s = String(val).trim().toLowerCase();
    if (s === "true" || s === "yes" || s === "y" || s === "1") return "YES";
    if (s === "false" || s === "no" || s === "n" || s === "0") return "NO";
    return String(val);
  }

  function valStatus(v) {
    if (v === null || v === undefined) return { status: "MISSING", klass: "bad", detail: "" };

    if (Array.isArray(v)) {
      const empty = v.length === 0 || v.every((x) => x === null || x === undefined || String(x).trim() === "");
      if (empty) return { status: "MISSING", klass: "bad", detail: "" };
      return { status: "OK", klass: "ok", detail: v.join(", ") };
    }

    const s = String(v).trim();
    if (!s) return { status: "MISSING", klass: "bad", detail: "" };
    return { status: "OK", klass: "ok", detail: s };
  }

  function fmtDateRange(startYmd, endYmd) {
    if (!startYmd || !endYmd) return "";
    return `${startYmd} to ${endYmd}`;
  }

  function displayValue(value) {
    if (value === null || value === undefined) return "";
    if (Array.isArray(value)) return value.join(", ");
    return String(value);
  }

  async function loadPayrollDashboard({ forceRefresh = false } = {}) {
    if (!forceRefresh && Array.isArray(state.dashboardRows)) {
      renderPayrollDashboard();
      return;
    }

    state.dashboardLoading = true;
    state.dashboardError = "";
    renderPayrollDashboard();

    try {
      const { resp, body } = await apiGet("/staff/payroll-dashboard-active");
      if (!resp.ok) {
        state.dashboardError = body.error || "unknown_error";
        state.dashboardRows = null;
        state.dashboardLastRefreshedAt = null;
        return;
      }

      state.dashboardRows = Array.isArray(body.rows) ? body.rows : [];
      state.dashboardLastRefreshedAt = body.refreshed_at || new Date().toISOString();
    } catch (err) {
      state.dashboardError = (err && err.message) || "unknown_error";
      state.dashboardRows = null;
      state.dashboardLastRefreshedAt = null;
    } finally {
      state.dashboardLoading = false;

  function collectRowPayload(tr) {
    const ruleId = tr.getAttribute("data-rule-id");
    const getSelectVal = (field) => {
      const sel = tr.querySelector(`select[data-field='${field}']`);
      return sel ? sel.value : "NO";
    };

    const paramsInput = tr.querySelector("input[data-field='params']");
    const params = paramsInput ? paramsInput.value.trim() : null;

    return {
      rule_id: ruleId,
      active: getSelectVal("active"),
      internal_notification: getSelectVal("internal_notification"),
      one_task_per_finding: getSelectVal("one_task_per_finding"),
      include_in_preview_recap_report: getSelectVal("include_in_preview_recap_report"),
      params: params === "" ? null : params,
    };

  async function saveRuleRow(tr) {
    const btn = tr.querySelector("button[data-action='save-row']");
    const original = btn.textContent;
    btn.textContent = "Saving...";
    btn.disabled = true;

    try {
      const payload = collectRowPayload(tr);
      const q = encodeURIComponent(state.rulesLocationName);
      const { resp, body } = await apiPut(`/staff/rules?locationName=${q}`, { rules: [payload] });
      if (!resp.ok) {
        alert(`Save failed: ${body.error || "unknown_error"}`);
        return;
      }
      btn.textContent = "Saved";
      setTimeout(() => {
        btn.textContent = original;
        btn.disabled = false;
      }, 600);
    } catch (e) {
      alert(`Save failed: ${e.message || e}`);
    } finally {
      if (btn.textContent !== "Saved") {
        btn.textContent = original;
        btn.disabled = false;
      }
    }
  }

          <tr data-rule-id="${rid}">
            <td><span class="mono">${rid}</span></td>
            <td>${rname}</td>
            <td>${paramsCell}</td>
            <td>

              </div>
            </td>
            <td>${yesNoSelect(clientActive, "client_active")}</td>

          </tr>
        `;
      })

        </tbody>
      </table>
      <div class="muted" style="margin-top:10px;">
        Defaults: Active matches Internal Active (or YES if missing), Include to Email YES.
      </div>
    `;

    content.innerHTML = header + tableHead + rows + tableFoot;

    document.getElementById("saveAllClientRulesBtn").addEventListener("click", saveAllClientRules);
    document.getElementById("reloadClientRulesBtn").addEventListener("click", () => loadClientRulesForSelected());

    content.querySelectorAll("button[data-action='save-client-row']").forEach((btn) => {
      btn.addEventListener("click", async (e) => {
        const tr = e.target.closest("tr");
        if (!tr) return;

  function collectClientRowPayload(tr) {
    const ruleId = tr.getAttribute("data-rule-id");
    const getSelectVal = (field) => {
      const sel = tr.querySelector(`select[data-field='${field}']`);
      return sel ? sel.value : "NO";
    };

    const paramsInput = tr.querySelector("input[data-field='params']");
    const params = paramsInput ? paramsInput.value.trim() : null;

    return {
      rule_id: ruleId,
      client_active: getSelectVal("client_active"),
      client_include_to_email: getSelectVal("client_include_to_email"),
      params: params === "" ? null : params,
    };
  }

  async function saveClientRuleRow(tr) {
    const btn = tr.querySelector("button[data-action='save-client-row']");
    const original = btn.textContent;
    btn.textContent = "Saving...";
    btn.disabled = true;

    try {
      const payload = collectClientRowPayload(tr);
      const q = encodeURIComponent(state.clientRulesLocationName);
      const { resp, body } = await apiPut(`/staff/client-rules?locationName=${q}`, { rules: [payload] });
      if (!resp.ok) {
        alert(`Save failed: ${body.error || "unknown_error"}`);
        return;
      }
      btn.textContent = "Saved";
      setTimeout(() => {
        btn.textContent = original;
        btn.disabled = false;
      }, 600);
    } catch (e) {
      alert(`Save failed: ${e.message || e}`);
    } finally {
      if (btn.textContent !== "Saved") {
        btn.textContent = original;
        btn.disabled = false;
      }
    }
  }

  async function saveAllClientRules() {
    if (!state.clientRulesLocationName) return;

      const q = encodeURIComponent(state.clientRulesLocationName);
      const { resp, body } = await apiPut(`/staff/client-rules?locationName=${q}`, { rules });
      if (!resp.ok) {
        alert(`Save failed: ${body.error || "unknown_error"}`);
        return;
      }
      btn.textContent = "Saved";
      setTimeout(() => {
        btn.textContent = original;
        btn.disabled = false;
      }, 800);
    } catch (e) {
      alert(`Save failed: ${e.message || e}`);
    } finally {
      if (btn.textContent !== "Saved") {
        btn.textContent = original;
        btn.disabled = false;
      }
    }

  async function loadCommunicationSetupForSelected() {
    const content = document.getElementById("content");
    const name = document.getElementById("locationSelect").value;

    state.communicationRecipients = null;
    state.communicationLocationName = name || null;
    state.communicationRowEdits = {};
    state.communicationRowMessages = {};

    if (!name) {
      content.innerHTML = "<div class='loading'>Select a location to load communication setup.</div>";
      return;

    content.innerHTML = "<div class='loading'>Loading communication setup...</div>";

    const { resp, body } = await apiGet(`/staff/communication-setup?locationName=${q}`);

      content.innerHTML = `<div class="muted">Communication setup error: ${escapeHtml(body.error || "unknown_error")}</div>`;

  function getCommunicationRowSelectValue(email, savedBool) {
    const normalized = String(email || "").trim().toLowerCase();
    if (Object.prototype.hasOwnProperty.call(state.communicationRowEdits, normalized)) {
      return state.communicationRowEdits[normalized] ? "YES" : "NO";
    }
    return savedBool === false ? "NO" : "YES";
  }

  function renderCommunicationSetup() {
    const content = document.getElementById("content");

    if (!state.communicationLocationName) {
      content.innerHTML = "<div class='loading'>Select a location to load communication setup.</div>";
      return;
    }

    if (!state.communicationRecipients) {
      content.innerHTML = "<div class='loading'>Loading communication setup...</div>";
      return;
    }

    const rows = state.communicationRecipients;
    const empty = rows.length === 0;

    const tableHtml = empty
      ? `<div class="muted">No payroll preview email recipients found in Airtable for this location.</div>`
      : `
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th style="width:220px;">Send Validation Email</th>
            <th style="width:220px;">Save</th>
          </tr>
        </thead>
        <tbody>
          ${rows
            .map((row) => {
              const email = String(row.email || "").trim();
              const normalized = email.toLowerCase();
              const selectValue = getCommunicationRowSelectValue(email, row.send_validation_email);
              const rowMessage = state.communicationRowMessages[normalized] || null;
              return `
                <tr data-comm-email="${escapeAttr(email)}">
                  <td>${escapeHtml(email)}</td>
                  <td>
                    <select data-field="send_validation_email">
                      <option value="YES" ${selectValue === "YES" ? "selected" : ""}>YES</option>
                      <option value="NO" ${selectValue === "NO" ? "selected" : ""}>NO</option>
                    </select>

                  <td>
                    <button class="btn" data-action="save-communication-row" type="button">Save</button>
                    ${
                      rowMessage
                        ? `<div class="muted" style="margin-top:6px;color:${
                            rowMessage.type === "error" ? "#b91c1c" : "#065f46"
                          }">${escapeHtml(rowMessage.text)}</div>`
                        : ""
                    }
                  </td>
                </tr>
              `;
            })
            .join("")}
        </tbody>
      </table>
    `;

    content.innerHTML = `
      <div class="sectionTitle">Validation Email Recipients</div>
      <p class="sectionHelp">Recipients are pulled from Airtable Payroll Preview email fields. Choose which addresses should receive the future validation email.</p>
      ${tableHtml}
    `;

    content.querySelectorAll("tr[data-comm-email] select[data-field='send_validation_email']").forEach((el) => {
      el.addEventListener("change", (event) => {
        const tr = event.target.closest("tr[data-comm-email]");
        if (!tr) return;
        const email = String(tr.getAttribute("data-comm-email") || "").trim().toLowerCase();
        state.communicationRowEdits[email] = event.target.value === "YES";
      });
    });

    content.querySelectorAll("button[data-action='save-communication-row']").forEach((btn) => {
      btn.addEventListener("click", async (event) => {
        const tr = event.target.closest("tr[data-comm-email]");
        if (!tr) return;
        await saveCommunicationRow(tr);
      });
    });
  }

  async function saveCommunicationRow(tr) {
    const email = String(tr.getAttribute("data-comm-email") || "").trim();
    if (!email || !state.communicationLocationName) return;

    const select = tr.querySelector("select[data-field='send_validation_email']");
    const btn = tr.querySelector("button[data-action='save-communication-row']");
    const sendValidationEmail = select && select.value === "YES";
    const originalText = btn.textContent;
    btn.textContent = "Saving...";
    btn.disabled = true;

    try {
      const q = encodeURIComponent(state.communicationLocationName);
      const { resp, body } = await apiPut(`/staff/communication-setup?locationName=${q}`, {
        email,
        send_validation_email: sendValidationEmail,
      });

      const normalized = email.toLowerCase();
      if (!resp.ok) {
        state.communicationRowMessages[normalized] = {
          type: "error",
          text: `Save failed: ${body.error || "unknown_error"}`,
        };
        renderCommunicationSetup();
        return;
      }

      const saved = body.recipient || {};
      state.communicationRowEdits[normalized] = saved.send_validation_email === true;
      state.communicationRecipients = state.communicationRecipients.map((row) => {
        if (String(row.email || "").trim().toLowerCase() !== normalized) return row;
        return {
          ...row,
          send_validation_email: saved.send_validation_email === true,
          updated_at: saved.updated_at || row.updated_at || null,
          updated_by: saved.updated_by || row.updated_by || null,
        };
      });
      state.communicationRowMessages[normalized] = { type: "success", text: "Saved." };

      // TODO: Future validation email send should send only to recipients where send_validation_email = true.
      // TODO: If any recipient clicks Confirm Validation, the payroll dashboard should later mark payroll as validated.

      renderCommunicationSetup();
    } catch (e) {
      const normalized = email.toLowerCase();
      state.communicationRowMessages[normalized] = {
        type: "error",
        text: `Save failed: ${e.message || e}`,
      };
      renderCommunicationSetup();
    } finally {
      btn.textContent = originalText;
      btn.disabled = false;
    }
  }

  function renderSearchResults() {
    if (state.excludedSearchLoading) {
      return `<div class="searchHint">Searching employees...</div>`;
    }
    if (!state.excludedHasSearched) {
      return `<div class="searchHint">Type at least 2 characters to search.</div>`;

    }

      <div class="searchResults">
        ${state.employeeSearchResults
          .map((emp) => {

            return `

                <span>
                  <div class="searchPrimary">${escapeHtml(emp.employeeName || "Unknown Employee")}</div>
                  <div class="searchSecondary muted">${escapeHtml(emp.employeeId || "ID unavailable")}</div>

          })

  function renderExcludedTab() {
    const content = document.getElementById("content");
    if (!state.excludedLocationName) {
      content.innerHTML = "<div class='loading'>Select a location to manage excluded staff.</div>";
      return;
    }

    content.innerHTML = `
      <div class="stack">
        <div class="panel">
          <div class="sectionTitle" style="margin-top:0;">Add Excluded Staff</div>
          <p class="sectionHelp">Search for one employee, add a reason, then save.</p>

            <input class="input" id="excludedSearchInput" placeholder="Search Toast employee by name or ID" style="flex:1;min-width:260px;" />
            <button class="btn" id="excludedSearchBtn" type="button">Search</button>
          </div>

            <input class="input" id="excludedNoteInput" placeholder="Note (optional)" style="flex:1;min-width:220px;" value="${escapeAttr(state.excludedDraftNote)}" />

          </div>

  function onExcludedSearchInputChange(e) {
    state.excludedSearchQuery = (e.target.value || "").trim();
    clearTimeout(excludedSearchDebounceTimer);
    excludedSearchDebounceTimer = null;
    if (state.excludedSearchQuery.length < 2) {
      state.excludedSearchLoading = false;
      state.excludedHasSearched = false;
      state.employeeSearchResults = [];
      state.selectedSearchEmployeeId = null;
      renderExcludedTab();
      return;
    }

    excludedSearchDebounceTimer = setTimeout(() => {
      searchEmployeesForExcluded({ allowShortQuery: false, silentEmpty: true });
    }, 300);
  }

  async function searchEmployeesForExcluded(opts = {}) {
    const { allowShortQuery = true, silentEmpty = false } = opts;
    if (!state.excludedLocationName) return;
    const input = document.getElementById("excludedSearchInput");
    const q = (input && input.value ? input.value : "").trim();
    state.excludedSearchQuery = q;
    if (!q) {
      if (!silentEmpty) alert("Enter a search term first.");
      return;
    }
    if (!allowShortQuery && q.length < 2) {
      return;
    }

    state.excludedSearchLoading = true;
    state.excludedHasSearched = true;
    renderExcludedTab();
    const query = new URLSearchParams({
      locationName: state.excludedLocationName,
      q,
      limit: "12",
    });
    const { resp, body } = await apiGet(`/staff/toast-employees?${query.toString()}`);
    state.excludedSearchLoading = false;
    if (!resp.ok) {
      renderExcludedTab();
      alert(`Employee search failed: ${body.error || "unknown_error"}`);
      return;
    }
    state.employeeSearchResults = Array.isArray(body.employees) ? body.employees : [];
    state.selectedSearchEmployeeId = state.employeeSearchResults[0]?.employeeId || null;
    renderExcludedTab();
  }

  async function addSelectedExcludedStaff() {
    if (!state.excludedLocationName) return;
    const employeeId = state.selectedSearchEmployeeId;
    const selected = state.employeeSearchResults.find((x) => x.employeeId === employeeId);
    if (!selected) {
      alert("Pick one employee from search results.");
      return;
    }

    const reason = (document.getElementById("excludedReasonInput")?.value || "").trim();
    const notes = (document.getElementById("excludedNoteInput")?.value || "").trim();
    state.excludedDraftReason = reason;
    state.excludedDraftNote = notes;
    if (!reason) {
      alert("Reason is required.");
      return;
    }

    const { resp, body } = await apiPost("/staff/excluded", {
      location_name: state.excludedLocationName,
      toast_employee_id: selected.employeeId,
      employee_name: selected.employeeName,
      reason,
      notes: notes || null,
      active: true,
    });
    if (!resp.ok) {
      alert(`Add failed: ${body.error || "unknown_error"}`);
      return;
    }
    state.excludedDraftReason = "";
    state.excludedDraftNote = "";
    await loadExcludedForSelected();
  }

  async function onEditExcludedRow(e) {
    const tr = e.target.closest("tr[data-excluded-id]");
    if (!tr) return;
    const id = tr.getAttribute("data-excluded-id");
    const row = state.excluded.find((x) => String(x.id) === String(id));
    if (!row) return;

    const reason = window.prompt("Update exclusion reason:", row.reason || "");
    if (reason === null) return;
    const notes = window.prompt("Update note (optional):", row.notes || "");
    if (notes === null) return;
    const active = window.confirm("Keep this exclusion active?\nPress Cancel to mark inactive.");

    const { resp, body } = await apiPut(`/staff/excluded/${encodeURIComponent(id)}`, {
      reason: reason.trim(),
      notes: notes.trim() || null,
      active,
    });
    if (!resp.ok) {
      alert(`Update failed: ${body.error || "unknown_error"}`);
      return;
    }
    await loadExcludedForSelected();
  }

  async function onRemoveExcludedRow(e) {
    const tr = e.target.closest("tr[data-excluded-id]");
    if (!tr) return;
    const id = tr.getAttribute("data-excluded-id");
    const ok = window.confirm("Remove this staff member from active exclusions?");
    if (!ok) return;
    const { resp, body } = await apiDelete(`/staff/excluded/${encodeURIComponent(id)}`);
    if (!resp.ok) {
      alert(`Remove failed: ${body.error || "unknown_error"}`);
      return;

    await loadExcludedForSelected();

  function outcomeSelectedPeriod() {
    const selector = state.outcomeSelector || {};
    if (state.outcomeSelectionBucket === "current") return selector.current_pay_period || null;
    if (state.outcomeSelectionBucket === "next") return selector.next_pay_period || null;
    if (state.outcomeSelectionBucket === "prior") {
      const list = Array.isArray(selector.prior_pay_periods) ? selector.prior_pay_periods : [];
      return list.find((p) => String(p.record_id) === String(state.outcomeSelectionPriorRecordId)) || null;
    }
    return null;
  }

  function buildOutcomePeriodOptions(selector) {
    const options = [];
    if (selector?.next_pay_period) {
      options.push({
        bucket: "next",
        recordId: "",
        value: "next",
        label: `${fmtDateRange(selector.next_pay_period.start_date, selector.next_pay_period.end_date)}    Next Pay Period`,
      });
    }
    if (selector?.current_pay_period) {
      options.push({
        bucket: "current",
        recordId: "",
        value: "current",
        label: `${fmtDateRange(selector.current_pay_period.start_date, selector.current_pay_period.end_date)}    Current Pay Period`,
      });
    }
    const prior = Array.isArray(selector?.prior_pay_periods) ? selector.prior_pay_periods : [];
    prior.forEach((p) => {
      options.push({
        bucket: "prior",
        recordId: String(p.record_id || ""),
        value: `prior:${String(p.record_id || "")}`,
        label: fmtDateRange(p.start_date, p.end_date),
      });
    });
    return options;
  }

  function ensureOutcomeSelection(selector) {
    const options = buildOutcomePeriodOptions(selector);
    if (!options.length) {
      state.outcomeSelectionBucket = "";
      state.outcomeSelectionPriorRecordId = "";
      return;
    }

    const selectedValue =
      state.outcomeSelectionBucket === "prior"
        ? `prior:${String(state.outcomeSelectionPriorRecordId || "")}`
        : state.outcomeSelectionBucket || "";

    const existing = options.find((opt) => opt.value === selectedValue);
    if (existing) {
      state.outcomeSelectionBucket = existing.bucket;
      state.outcomeSelectionPriorRecordId = existing.recordId;
      return;
    }

    const defaultBucket = selector?.default_selection?.bucket || "";
    const defaultRecordId = String(selector?.default_selection?.record_id || selector?.default_selection?.prior_record_id || "");
    const defaultValue = defaultBucket === "prior" ? `prior:${defaultRecordId}` : defaultBucket;
    const preferred = options.find((opt) => opt.value === defaultValue) || options[0];

    state.outcomeSelectionBucket = preferred.bucket;
    state.outcomeSelectionPriorRecordId = preferred.recordId;
  }

  function buildToastOriginalPeriodOptions(selector) {
    const options = [];
    if (selector?.next_pay_period) {
      options.push({
        bucket: "next",
        recordId: "",
        value: "next",
        label: `${fmtDateRange(selector.next_pay_period.start_date, selector.next_pay_period.end_date)}    Next Pay Period`,
      });
    }
    if (selector?.current_pay_period) {
      options.push({
        bucket: "current",
        recordId: "",
        value: "current",
        label: `${fmtDateRange(selector.current_pay_period.start_date, selector.current_pay_period.end_date)}    Current Pay Period`,
      });
    }
    const prior = Array.isArray(selector?.prior_pay_periods) ? selector.prior_pay_periods : [];
    prior.forEach((p) => {
      options.push({
        bucket: "prior",
        recordId: String(p.record_id || ""),
        value: `prior:${String(p.record_id || "")}`,
        label: fmtDateRange(p.start_date, p.end_date),
      });
    });
    return options;
  }

  function ensureToastOriginalSelection(selector) {
    const options = buildToastOriginalPeriodOptions(selector);
    if (!options.length) {
      state.toastOriginalSelectionBucket = "";
      state.toastOriginalSelectionPriorRecordId = "";
      return;
    }

    const selectedValue =
      state.toastOriginalSelectionBucket === "prior"
        ? `prior:${String(state.toastOriginalSelectionPriorRecordId || "")}`
        : state.toastOriginalSelectionBucket || "";

    const existing = options.find((opt) => opt.value === selectedValue);
    if (existing) {
      state.toastOriginalSelectionBucket = existing.bucket;
      state.toastOriginalSelectionPriorRecordId = existing.recordId;
      return;
    }

    const defaultBucket = selector?.default_selection?.bucket || "";
    const defaultRecordId = String(selector?.default_selection?.record_id || selector?.default_selection?.prior_record_id || "");
    const defaultValue = defaultBucket === "prior" ? `prior:${defaultRecordId}` : defaultBucket;
    const preferred = options.find((opt) => opt.value === defaultValue) || options[0];
    state.toastOriginalSelectionBucket = preferred.bucket;
    state.toastOriginalSelectionPriorRecordId = preferred.recordId;
  }

  function getSelectedToastOriginalPeriod() {
    const selector = state.toastOriginalSelector || {};
    let selected = null;
    if (state.toastOriginalSelectionBucket === "current") selected = selector.current_pay_period || null;
    else if (state.toastOriginalSelectionBucket === "next") selected = selector.next_pay_period || null;
    else if (state.toastOriginalSelectionBucket === "prior") {
      const list = Array.isArray(selector.prior_pay_periods) ? selector.prior_pay_periods : [];
      selected = list.find((p) => String(p.record_id) === String(state.toastOriginalSelectionPriorRecordId || "")) || null;
    }

    if (!selected) return null;
    const startDate = selected.start_date || selected.period_start || null;
    const endDate = selected.end_date || selected.period_end || null;
    if (!startDate || !endDate) return null;
    return {
      period_start: startDate,
      period_end: endDate,
      start_date: startDate,
      end_date: endDate,
      source: state.toastOriginalSelectionBucket || "unknown",
      label: fmtDateRange(startDate, endDate),
      period: selected,
    };
  }

  function getEarningsWipExportFormat(payrollCompanyRaw) {
    const payrollCompany = String(payrollCompanyRaw || "").trim();
    if (!payrollCompany) {
      return { formatLabel: "Missing payroll company", exportConfigured: false };
    }
    if (payrollCompany === "ADP Run") {
      return { formatLabel: "ADP Run Earnings WIP", exportConfigured: true };
    }
    if (payrollCompany === "ADP WFN") {
      return { formatLabel: "ADP WFN Earnings WIP, not configured yet", exportConfigured: false };
    }
    if (payrollCompany === "Paychex") {
      return { formatLabel: "Paychex Earnings WIP, not configured yet", exportConfigured: false };
    }
    return {
      formatLabel: "No Earnings WIP export format configured for this payroll company",
      exportConfigured: false,
    };
  }

  function getStep3ReadinessStatus(comparison) {
    const summary = comparison?.summary || {};
    const hasIssue =
      (summary.rowVariance || 0) !== 0 ||
      Math.abs(summary.regVariance || 0) > (comparison?.hoursTolerance || 0.01) ||
      Math.abs(summary.otVariance || 0) > (comparison?.hoursTolerance || 0.01) ||
      (summary.rateMismatchCount || 0) > 0 ||
      (comparison?.csvKeyIssues || []).length > 0 ||
      (comparison?.apiKeyIssues || []).length > 0 ||
      (comparison?.missingInApi || []).length > 0 ||
      (comparison?.missingInCsv || []).length > 0 ||
      (comparison?.hourMismatches || []).length > 0;
    return hasIssue
      ? {
          ready: false,
          title: "Review required before export",
          detail: "Step 3 has comparison issues. Export is allowed only with override.",
          toneClass: "review",
        }
      : {
          ready: true,
          title: "Ready to export",
          detail: "No blocking comparison issues found.",
          toneClass: "matched",
        };
  }

  async function loadOutcomeSelectorForSelected() {
    state.outcomeSelector = null;
    state.outcomeResult = null;
    state.outcomeRunError = "";
    state.outcomeRunning = false;
    state.outcomeSelectionBucket = "";
    state.outcomeSelectionPriorRecordId = "";
    renderOutcomeTab();
    const name = document.getElementById("locationSelect").value;
    if (!name) return;
    const q = encodeURIComponent(name);
    const { resp, body } = await apiGet(`/staff/pay-period-selector?locationName=${q}`);
    if (!resp.ok) {
      state.outcomeRunError = body.error || "selector_load_failed";
      state.outcomeSelector = { current_pay_period: null, next_pay_period: null, prior_pay_periods: [] };
      renderOutcomeTab();
      return;
    }
    const selector = body.selector || {};
    state.outcomeSelector = selector;
    ensureOutcomeSelection(selector);
    renderOutcomeTab();
  }

  async function runOutcomeValidation() {
    const selected = outcomeSelectedPeriod();
    if (!selected) {
      state.outcomeRunning = false;
      state.outcomeRunError = "no_selected_pay_period";
      renderOutcomeTab();
      return;
    }
    state.outcomeRunning = true;
    state.outcomeRunError = "";
    renderOutcomeTab();

    const locationName = document.getElementById("locationSelect").value;
    try {
      const { resp, body } = await apiPost("/staff/validation-outcome/run", {
        location_name: locationName,
        period_start: selected.start_date,
        period_end: selected.end_date,
        validation_date: selected.validation_date || null,
      });
      if (!resp.ok) {
        state.outcomeRunError = body.error || "run_failed";
        state.outcomeResult = null;
        return;
      }
      state.outcomeResult = { run: body.run || null, outcome: body.outcome || null };
    } catch (err) {
      state.outcomeRunError = (err && err.message) || "run_failed";
      state.outcomeResult = null;
    } finally {
      state.outcomeRunning = false;
      renderOutcomeTab();
    }
  }

  function getComparisonSummaryHtml(comparison) {
    if (!comparison || !comparison.summary) return "<div class='muted'>No CSV baseline uploaded for this period. Comparison mode appears after upload.</div>";
    const s = comparison.summary;
    return `
      <div class="row" style="gap:12px;flex-wrap:wrap;">
        <span class="pill">API rows: ${escapeHtml(String(s.api_row_count || 0))}</span>
        <span class="pill">CSV rows: ${escapeHtml(String(s.csv_row_count || 0))}</span>
        <span class="pill ${s.row_count_delta === 0 ? 'ok' : 'warn'}">Row count delta (API-CSV): ${escapeHtml(String(s.row_count_delta || 0))}</span>
        <span class="pill ${s.missing_in_csv_count ? 'warn' : 'ok'}">Missing in CSV: ${escapeHtml(String(s.missing_in_csv_count || 0))}</span>
        <span class="pill ${s.missing_in_api_count ? 'warn' : 'ok'}">Missing in API: ${escapeHtml(String(s.missing_in_api_count || 0))}</span>
        <span class="pill ${s.mismatch_count ? 'warn' : 'ok'}">Column mismatches: ${escapeHtml(String(s.mismatch_count || 0))}</span>
      </div>
    `;
  }

  function getToastComparisonStatus(comparison, fallbackCsvRowCount) {
    const s = comparison && comparison.summary ? comparison.summary : null;
    if (!s) {
      if ((fallbackCsvRowCount || 0) > 0) {
        return {
          label: "CLOSE / REVIEW",
          klass: "review",
          reason: "CSV baseline uploaded. Load Original Toast Data to score comparison.",
        };
      }
      return { label: "CLOSE / REVIEW", klass: "review", reason: "Upload a CSV baseline to score a full comparison." };
    }
    const hardProblem = (s.missing_in_csv_count || 0) > 0 || (s.missing_in_api_count || 0) > 0;
    if (hardProblem) {
      return { label: "PROBLEM", klass: "problem", reason: "Rows are missing on one side of the comparison." };
    }
    if ((s.mismatch_count || 0) > 0 || (s.row_count_delta || 0) !== 0) {
      return { label: "CLOSE / REVIEW", klass: "review", reason: "Counts align, but one or more field-level mismatches exist." };
    }
    return { label: "MATCHED", klass: "matched", reason: "API and uploaded CSV rows align with no detected mismatches." };
  }

  function extractToastOriginalCsvRows(source) {
    if (!source || typeof source !== "object") return [];
    if (Array.isArray(source.normalized_rows)) return source.normalized_rows;
    if (Array.isArray(source.uploaded_csv_rows)) return source.uploaded_csv_rows;
    if (Array.isArray(source.csv_rows)) return source.csv_rows;
    if (Array.isArray(source.rows)) return source.rows;
    return [];
  }

  function toSafeNumber(value) {
    const n = Number(value);
    return Number.isFinite(n) ? n : 0;
  }

  function buildUploadReviewSummary(baseline) {
    if (!baseline) return null;
    const normalizedRows = extractToastOriginalCsvRows(baseline);
    const summary = baseline.upload_review_summary && typeof baseline.upload_review_summary === "object" ? baseline.upload_review_summary : null;
    const uniqueEmployeeIds = new Set();
    let regularHours = 0;
    let overtimeHours = 0;

    normalizedRows.forEach((row) => {
      const employeeId = String(row?.["Employee ID"] || row?.employee_id || "").trim();
      if (employeeId) uniqueEmployeeIds.add(employeeId);
      regularHours += toSafeNumber(row?.["Regular Hours"] ?? row?.regular_hours);
      overtimeHours += toSafeNumber(row?.["Overtime Hours"] ?? row?.overtime_hours);
    });

    return {
      rows: summary ? Math.max(0, Math.trunc(toSafeNumber(summary.rows))) : normalizedRows.length,
      uniqueEmployees: uniqueEmployeeIds.size,
      regularHours: normalizedRows.length ? regularHours : toSafeNumber(summary?.regular_hours),
      overtimeHours: normalizedRows.length ? overtimeHours : toSafeNumber(summary?.ot_hours),
    };
  }

  function renderUploadReviewSection(baseline) {
    const summary = buildUploadReviewSummary(baseline);
    if (!summary) {
      return `
        <div class="statusCard review" style="margin-top:12px;">
          <div class="statusCardTitle">Upload Review</div>
          <div class="statusCardValue">PENDING</div>
          <div class="muted" style="margin-top:4px;">No CSV uploaded for this pay period yet.</div>
        </div>
      `;
    }

    return `
      <div class="statusCard matched" style="margin-top:12px;">
        <div class="statusCardTitle">Upload Review</div>
        <div class="statusCardValue">READY</div>
        <div class="muted" style="margin-top:4px;">CSV uploaded for selected pay period.</div>
      </div>
      <div class="summaryGrid" style="margin-top:10px;">
        <div class="summaryMetric"><div class="summaryMetricLabel">Rows</div><div class="summaryMetricValue">${escapeHtml(String(summary.rows))}</div></div>
        <div class="summaryMetric"><div class="summaryMetricLabel">Unique Employees</div><div class="summaryMetricValue">${escapeHtml(String(summary.uniqueEmployees))}</div></div>
        <div class="summaryMetric"><div class="summaryMetricLabel">Regular Hours</div><div class="summaryMetricValue">${escapeHtml(summary.regularHours.toFixed(2))}</div></div>
        <div class="summaryMetric"><div class="summaryMetricLabel">OT Hours</div><div class="summaryMetricValue">${escapeHtml(summary.overtimeHours.toFixed(2))}</div></div>
      </div>
    `;
